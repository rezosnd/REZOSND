<svg width="100%" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Sourav ND animated profile banner</title>
<desc>Animated night-to-dawn landscape with shooting stars, aurora, mountains, pine trees, river, birds and glowing sun for Sourav ND GitHub profile</desc>
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#03001e"/>
    <stop offset="35%" stop-color="#1a0533"/>
    <stop offset="65%" stop-color="#3d1560"/>
    <stop offset="85%" stop-color="#7c2d92" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#f97316" stop-opacity="0.45"/>
  </linearGradient>
  <linearGradient id="aurora1" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#06b6d4" stop-opacity="0"/>
    <stop offset="30%" stop-color="#06b6d4" stop-opacity="0.25"/>
    <stop offset="60%" stop-color="#a855f7" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="aurora2" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#a855f7" stop-opacity="0"/>
    <stop offset="40%" stop-color="#ec4899" stop-opacity="0.2"/>
    <stop offset="70%" stop-color="#06b6d4" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="suncore" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#fff7aa"/>
    <stop offset="35%" stop-color="#fde68a"/>
    <stop offset="70%" stop-color="#fb923c"/>
    <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="sunhalo" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#fb923c" stop-opacity="0.4"/>
    <stop offset="60%" stop-color="#f97316" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="moongrad" cx="40%" cy="35%" r="55%">
    <stop offset="0%" stop-color="#fef9c3"/>
    <stop offset="100%" stop-color="#fde68a"/>
  </radialGradient>
  <linearGradient id="mtn1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2e1065"/>
    <stop offset="100%" stop-color="#0f0c29"/>
  </linearGradient>
  <linearGradient id="mtn2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4c1d95"/>
    <stop offset="100%" stop-color="#1e1b4b"/>
  </linearGradient>
  <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1e1b4b"/>
    <stop offset="100%" stop-color="#03001e"/>
  </linearGradient>
  <linearGradient id="river" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.1"/>
    <stop offset="25%" stop-color="#c4b5fd" stop-opacity="0.7"/>
    <stop offset="50%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    <stop offset="75%" stop-color="#c4b5fd" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.1"/>
  </linearGradient>
  <clipPath id="clip"><rect x="0" y="0" width="900" height="340"/></clipPath>
  <style>
    @keyframes shootStar1{0%{transform:translate(0,0);opacity:1}70%{opacity:0.8}100%{transform:translate(220px,110px);opacity:0}}
    @keyframes shootStar2{0%{transform:translate(0,0);opacity:1}60%{opacity:0.9}100%{transform:translate(180px,90px);opacity:0}}
    @keyframes shootStar3{0%{transform:translate(0,0);opacity:0.9}65%{opacity:0.7}100%{transform:translate(160px,80px);opacity:0}}
    @keyframes twinkle1{0%,100%{opacity:1;r:1.4}50%{opacity:0.15;r:0.8}}
    @keyframes twinkle2{0%,100%{opacity:0.8;r:1.1}50%{opacity:0.1;r:0.5}}
    @keyframes twinkle3{0%,100%{opacity:0.9;r:1.6}50%{opacity:0.2;r:0.9}}
    @keyframes aurora1anim{0%,100%{d:path("M0,80 Q150,40 300,70 Q450,100 600,55 Q750,20 900,65 L900,120 Q750,80 600,110 Q450,140 300,105 Q150,75 0,115Z");opacity:0.5}50%{d:path("M0,90 Q150,55 300,85 Q450,115 600,68 Q750,35 900,78 L900,130 Q750,90 600,122 Q450,152 300,115 Q150,85 0,125Z");opacity:0.7}}
    @keyframes aurora2anim{0%,100%{d:path("M0,105 Q200,65 400,90 Q600,115 800,72 Q870,58 900,80 L900,145 Q870,120 800,135 Q600,165 400,135 Q200,108 0,148Z");opacity:0.4}50%{d:path("M0,115 Q200,78 400,102 Q600,128 800,85 Q870,70 900,92 L900,158 Q870,132 800,148 Q600,178 400,148 Q200,120 0,160Z");opacity:0.6}}
    @keyframes sunPulse{0%,100%{r:26}50%{r:29}}
    @keyframes haloPulse{0%,100%{r:68;opacity:0.45}50%{r:78;opacity:0.65}}
    @keyframes sunRise{0%{transform:translateY(28px);opacity:0}100%{transform:translateY(0);opacity:1}}
    @keyframes moonGlow{0%,100%{opacity:0.88}50%{opacity:1}}
    @keyframes birdFly1{0%{transform:translate(-100px,0)}100%{transform:translate(1010px,-50px)}}
    @keyframes birdFly2{0%{transform:translate(-140px,0)}100%{transform:translate(1010px,-30px)}}
    @keyframes birdFly3{0%{transform:translate(-80px,0)}100%{transform:translate(1010px,-70px)}}
    @keyframes wingA{0%,100%{d:path("M0,0 Q-8,-6 -15,0 Q-8,3 0,0 Q8,-6 15,0 Q8,3 0,0")}50%{d:path("M0,0 Q-8,3 -15,0 Q-8,-2 0,0 Q8,3 15,0 Q8,-2 0,0")}}
    @keyframes wingB{0%,100%{d:path("M0,0 Q-5,-4 -10,0 Q-5,2 0,0 Q5,-4 10,0 Q5,2 0,0")}50%{d:path("M0,0 Q-5,2 -10,0 Q-5,-1 0,0 Q5,2 10,0 Q5,-1 0,0")}}
    @keyframes wingC{0%,100%{d:path("M0,0 Q-3,-3 -7,0 Q-3,1.5 0,0 Q3,-3 7,0 Q3,1.5 0,0")}50%{d:path("M0,0 Q-3,1.5 -7,0 Q-3,-1 0,0 Q3,1.5 7,0 Q3,-1 0,0")}}
    @keyframes pineSway1{0%,100%{transform:rotate(0deg)}50%{transform:rotate(1.8deg)}}
    @keyframes pineSway2{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-1.5deg)}}
    @keyframes riverShimmer{0%,100%{opacity:0.5}50%{opacity:1}}
    @keyframes mistDrift{0%,100%{transform:translateX(0)scaleX(1);opacity:0.35}50%{transform:translateX(18px)scaleX(1.04);opacity:0.55}}
    @keyframes firefly{0%,100%{opacity:0;r:1.5}40%,60%{opacity:1;r:2}}
    @keyframes nameFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    .ss1{animation:shootStar1 5s ease-out 1s infinite}
    .ss2{animation:shootStar2 7s ease-out 3.5s infinite}
    .ss3{animation:shootStar3 6s ease-out 6s infinite}
    .tw1{animation:twinkle1 2.2s ease-in-out infinite}
    .tw2{animation:twinkle2 3.1s ease-in-out 0.6s infinite}
    .tw3{animation:twinkle3 1.9s ease-in-out 1.3s infinite}
    .tw4{animation:twinkle1 4.0s ease-in-out 0.9s infinite}
    .tw5{animation:twinkle2 2.7s ease-in-out 1.8s infinite}
    .au1{animation:aurora1anim 8s ease-in-out infinite}
    .au2{animation:aurora2anim 10s ease-in-out 2s infinite}
    .sun-g{animation:sunRise 2.5s ease-out 0.3s both}
    .sun-c{animation:sunPulse 3.5s ease-in-out infinite}
    .sun-h{animation:haloPulse 3.5s ease-in-out infinite}
    .moon{animation:moonGlow 4s ease-in-out infinite}
    .b1{animation:birdFly1 16s linear infinite}
    .b2{animation:birdFly2 20s linear 5s infinite}
    .b3{animation:birdFly3 24s linear 11s infinite}
    .wA{animation:wingA 0.45s ease-in-out infinite}
    .wB{animation:wingB 0.45s ease-in-out infinite}
    .wC{animation:wingC 0.5s ease-in-out infinite}
    .p1{animation:pineSway1 5s ease-in-out infinite;transform-origin:center 290px}
    .p2{animation:pineSway2 6.5s ease-in-out 1s infinite;transform-origin:center 290px}
    .rv{animation:riverShimmer 2.8s ease-in-out infinite}
    .mist{animation:mistDrift 9s ease-in-out infinite}
    .ff1{animation:firefly 3.2s ease-in-out 0.5s infinite}
    .ff2{animation:firefly 4.1s ease-in-out 1.8s infinite}
    .ff3{animation:firefly 2.9s ease-in-out 0.2s infinite}
    .nm{animation:nameFloat 3s ease-in-out infinite}
    @media(prefers-reduced-motion:reduce){.ss1,.ss2,.ss3,.tw1,.tw2,.tw3,.tw4,.tw5,.au1,.au2,.sun-g,.sun-c,.sun-h,.moon,.b1,.b2,.b3,.wA,.wB,.wC,.p1,.p2,.rv,.mist,.ff1,.ff2,.ff3,.nm{animation:none}}
  </style>
</defs>
